<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="tile" x1="256" y1="40" x2="256" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2BC4E8"/>
      <stop offset="1" stop-color="#008CB2"/>
    </linearGradient>
    <linearGradient id="sheen" x1="120" y1="80" x2="392" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- left: the logo tile + >_ mark, reused 1:1 from the icon, scaled into place -->
  <g transform="translate(95,165) scale(0.625)">
    <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#tile)"/>
    <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#sheen)"/>
    <g transform="translate(-30,6)" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="206,166 300,256 206,346" fill="none" stroke-width="48"/>
    </g>
    <rect x="282" y="322" width="104" height="36" rx="18" fill="#ffffff"/>
  </g>

  <!-- wordmark: promptr + a coral terminal caret -->
  <text x="470" y="362" font-family="SF Mono, Menlo, monospace" font-weight="700"
        font-size="150" fill="#00ADD8" letter-spacing="-4">promptr</text>
  <rect x="1112" y="338" width="74" height="24" rx="12" fill="#FF7A59"/>

  <!-- tagline -->
  <text x="474" y="440" font-family="SF Mono, Menlo, monospace" font-weight="500"
        font-size="44" fill="#51626B">Typed prompts for Go.</text>

  <!-- DSL vocabulary pills: the keywords a .promptr schema is built from -->
  <g font-family="SF Mono, Menlo, monospace" font-weight="600" font-size="27" fill="#00ADD8">
    <g fill="none" stroke="#00ADD8" stroke-opacity="0.45" stroke-width="2">
      <rect x="474" y="508" width="96"  height="46" rx="23"/>
      <rect x="586" y="508" width="92"  height="46" rx="23"/>
      <rect x="694" y="508" width="96"  height="46" rx="23"/>
      <rect x="806" y="508" width="144" height="46" rx="23"/>
      <rect x="966" y="508" width="84"  height="46" rx="23"/>
    </g>
    <text x="481" y="540" fill-opacity="0.9">class</text>
    <text x="599" y="540" fill-opacity="0.9">enum</text>
    <text x="701" y="540" fill-opacity="0.9">union</text>
    <text x="813" y="540" fill-opacity="0.9">function</text>
    <text x="975" y="540" fill-opacity="0.9">tool</text>
  </g>
</svg>
